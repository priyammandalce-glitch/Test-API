name: Multi-Env Universal App Offboarding

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON Payload (ServiceNow/Postman)'
        required: true

jobs:
  offboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Execute Universal Offboarding
        env:
          OKTA_DOMAIN: ${{ secrets.OKTA_DOMAIN }}
          OKTA_TOKEN: ${{ secrets.OKTA_API_TOKEN }}
          AUTH_SERVER_ID: ${{ secrets.AUTH_SERVER_ID }}

        run: |
          set -e
          LOG_FILE="app_offboarding_log.md"

          if [ ! -f "$LOG_FILE" ]; then
            echo "# Okta App Offboarding Log" > "$LOG_FILE"
            echo "| Timestamp | Environment | App Label | Client ID / Entity ID | SignOn Mode | Status |" >> "$LOG_FILE"
            echo "| :--- | :--- | :--- | :--- | :--- | :--- |" >> "$LOG_FILE"
          fi

          echo '${{ github.event.inputs.payload }}' > offboard_apps.json
          INPUT_COUNT=$(jq '.apps | length' offboard_apps.json)

          for ((i=0; i<$INPUT_COUNT; i++)); do
            TARGET_LABEL=$(jq -r ".apps[$i].label" offboard_apps.json)
            TARGET_ENV=$(jq -r ".apps[$i].env | ascii_downcase" offboard_apps.json)

            DOMAIN=$OKTA_DOMAIN
            TOKEN=$OKTA_TOKEN
            AUTH_ID=$AUTH_SERVER_ID

            if [ "$TARGET_ENV" == "prod" ]; then
              POLICY_NAME="Default"
              SERVER_NAME="Production"
            elif [ "$TARGET_ENV" == "stg" ] || [ "$TARGET_ENV" == "staging" ]; then
              POLICY_NAME="Default"
              SERVER_NAME="Staging"
            else
              POLICY_NAME="Default"
              SERVER_NAME="Development"
            fi

            echo "đź”Ť Fetching all applications matching label: $TARGET_LABEL for $SERVER_NAME"

            RAW_RESPONSE=$(curl -s -X GET "$DOMAIN/api/v1/apps?q=$TARGET_LABEL" -H "Authorization: SSWS $TOKEN")

            IS_ARRAY=$(echo "$RAW_RESPONSE" | jq -r 'type == "array"' 2>/dev/null || echo "false")
            
            if [ "$IS_ARRAY" != "true" ]; then
              echo "âťŚ ERROR: Okta API did not return a valid app list array. Response was:"
              echo "$RAW_RESPONSE"
              exit 1
            fi

            MATCHING_APPS=$(echo "$RAW_RESPONSE" | jq -c "[.[] | select(.label==\"$TARGET_LABEL\")]")
            MATCH_COUNT=$(echo "$MATCHING_APPS" | jq '. | length')

            if [ "$MATCH_COUNT" -eq 0 ]; then
              echo "âš ď¸Ź WARNING: No application found with label '$TARGET_LABEL'. Skipping..."
              continue
            fi

            echo "đźŽŻ Found $MATCH_COUNT application(s) matching '$TARGET_LABEL'. Starting processing loop..."

            for ((m=0; m<$MATCH_COUNT; m++)); do
              APP_DATA=$(echo "$MATCHING_APPS" | jq -r ".[$m]")
              
              APP_ID=$(echo "$APP_DATA" | jq -r '.id')
              SIGNON_MODE=$(echo "$APP_DATA" | jq -r '.signOnMode')
              CLIENT_ID=$(echo "$APP_DATA" | jq -r '.credentials.oauthClient.client_id // .settings.saml.entityId // .id')

              echo "âš™ď¸Ź Processing App Instance ID: $APP_ID (Type: $SIGNON_MODE, Client ID: $CLIENT_ID)"

              echo "đź§ą Clearing explicit user assignments..."
              USER_ASSIGNMENTS=$(curl -s -X GET "$DOMAIN/api/v1/apps/$APP_ID/users?limit=200" -H "Authorization: SSWS $TOKEN")
              USER_COUNT=$(echo "$USER_ASSIGNMENTS" | jq '. | length')
              for ((u=0; u<$USER_COUNT; u++)); do
                USER_ID=$(echo "$USER_ASSIGNMENTS" | jq -r ".[$u].id")
                curl -s -X DELETE "$DOMAIN/api/v1/apps/$APP_ID/users/$USER_ID" -H "Authorization: SSWS $TOKEN" > /dev/null
              done

              if [ "$SIGNON_MODE" == "OPENID_CONNECT" ]; then
                POLICY_DATA=$(curl -s -X GET "$DOMAIN/api/v1/authorizationServers/$AUTH_ID/policies" -H "Authorization: SSWS $TOKEN" | jq -r ".[] | select(.name==\"$POLICY_NAME\")")
                POLICY_ID=$(echo "$POLICY_DATA" | jq -r '.id')
                
                if [ -n "$POLICY_ID" ] && [ "$POLICY_ID" != "null" ]; then
                  POLICY_DESC=$(echo "$POLICY_DATA" | jq -r '.description // ""')
                  EXISTING=$(echo "$POLICY_DATA" | jq '.conditions.clients.include // []')
                  UPDATED=$(echo "$EXISTING" | jq "map(select(. != \"$APP_ID\"))")

                  curl -s -X PUT "$DOMAIN/api/v1/authorizationServers/$AUTH_ID/policies/$POLICY_ID" \
                    -H "Authorization: SSWS $TOKEN" -H "Content-Type: application/json" \
                    -d "{\"type\":\"OAUTH_AUTHORIZATION_POLICY\",\"name\":\"$POLICY_NAME\",\"description\":\"$POLICY_DESC\",\"conditions\":{\"clients\":{\"include\":$UPDATED}}}" > /dev/null
                  echo "âś… Surgically removed from OIDC Authorization Policy Whitelist."
                fi
              else
                echo "đź§ą Clearing group assignments..."
                GROUP_ASSIGNMENTS=$(curl -s -X GET "$DOMAIN/api/v1/apps/$APP_ID/groups?limit=200" -H "Authorization: SSWS $TOKEN")
                GROUP_COUNT=$(echo "$GROUP_ASSIGNMENTS" | jq '. | length')
                
                for ((g=0; g<$GROUP_COUNT; g++)); do
                  GROUP_ID=$(echo "$GROUP_ASSIGNMENTS" | jq -r ".[$g].id")
                  curl -s -X DELETE "$DOMAIN/api/v1/apps/$APP_ID/groups/$GROUP_ID" -H "Authorization: SSWS $TOKEN" > /dev/null
                done
                echo "âś… Removed all group access controls associated with this application."
              fi

              curl -s -X POST "$DOMAIN/api/v1/apps/$APP_ID/lifecycle/deactivate" \
                -H "Authorization: SSWS $TOKEN" > /dev/null
              echo "âś… Deactivated Application: $TARGET_LABEL (Instance ID: $APP_ID set to INACTIVE)"

              TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
              echo "| $TIMESTAMP | $SERVER_NAME | $TARGET_LABEL | $CLIENT_ID | $SIGNON_MODE | DEACTIVATED |" >> "$LOG_FILE"
            done
          done

      - name: Push Universal Offboarding Log to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app_offboarding_log.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update universal offboarding log [skip ci]" && git push)
